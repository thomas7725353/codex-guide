name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: codex-guide-windows-x64.exe
            bin: codex-guide.exe
            package: codex-guide-windows-x64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: codex-guide-macos-arm64
            bin: codex-guide
            package: codex-guide-macos-arm64.dmg
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: codex-guide-macos-x64
            bin: codex-guide
            package: codex-guide-macos-x64.dmg

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact on Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}
          if [[ "${{ runner.os }}" == "macOS" ]]; then
            mkdir -p package
            cp dist/${{ matrix.asset }} package/codex-guide
            cp macos/安装Codex.command package/安装Codex.command
            cp macos/install-codex-local.sh package/install-codex-local.sh
            mkdir -p package/codex-gorustai-bootstrap
            cp skills/codex-gorustai-bootstrap/SKILL.md package/codex-gorustai-bootstrap/SKILL.md
            codex_tag="$(curl -fsSL https://api.github.com/repos/openai/codex/releases/latest | python3 -c 'import json,sys; print(json.load(sys.stdin)["tag_name"])')"
            codex_version="${codex_tag#rust-v}"
            codex_asset="codex-package-${{ matrix.target }}.tar.gz"
            curl -fL "https://github.com/openai/codex/releases/download/${codex_tag}/${codex_asset}" -o "package/${codex_asset}"
            curl -fL "https://github.com/openai/codex/releases/download/${codex_tag}/codex-package_SHA256SUMS" -o "package/codex-package_SHA256SUMS"
            printf "%s" "${codex_version}" > package/codex-version.txt
            printf "%s" "${{ matrix.target }}" > package/codex-target.txt
            chmod +x package/codex-guide package/安装Codex.command package/install-codex-local.sh
            hdiutil create -volname "Codex Guide" -srcfolder package -ov -format UDZO dist/${{ matrix.package }}
          fi
      - name: Prepare artifact on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "package/codex-guide.exe"
          Copy-Item "windows/安装Codex.bat" "package/安装Codex.bat"
          New-Item -ItemType Directory -Force -Path "package/codex-gorustai-bootstrap" | Out-Null
          Copy-Item "skills/codex-gorustai-bootstrap/SKILL.md" "package/codex-gorustai-bootstrap/SKILL.md"
          Compress-Archive -Path "package/*" -DestinationPath "dist/${{ matrix.package }}" -Force
      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.package }}
          if-no-files-found: error
      - name: Upload Unix artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.package }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
