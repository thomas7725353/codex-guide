name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset: codex-guide-windows-x64.exe
            bin: codex-guide.exe
            package: codex-guide-windows-x64.zip
          - os: macos-latest
            target: aarch64-apple-darwin
            asset: codex-guide-macos-arm64
            bin: codex-guide
            package: ""
          - os: macos-latest
            target: x86_64-apple-darwin
            asset: codex-guide-macos-x64
            bin: codex-guide
            package: ""

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Prepare artifact on Unix
        if: runner.os != 'Windows'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.bin }} dist/${{ matrix.asset }}
          chmod +x dist/${{ matrix.asset }}
      - name: Prepare artifact on Windows
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"
          New-Item -ItemType Directory -Force -Path package | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.bin }}" "package/codex-guide.exe"
          Copy-Item "windows/安装Codex.bat" "package/安装Codex.bat"
          Compress-Archive -Path "package/*" -DestinationPath "dist/${{ matrix.package }}" -Force
      - name: Upload Windows artifacts
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: |
            dist/${{ matrix.asset }}
            dist/${{ matrix.package }}
          if-no-files-found: error
      - name: Upload Unix artifact
        if: runner.os != 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: dist/${{ matrix.asset }}
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          generate_release_notes: true
